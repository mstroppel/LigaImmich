name: Build and Test

env:
  DOTNET_VERSION: '10.0.x'

on:
  pull_request: 
    branches:
      - main
    paths:
      - '**.cs'
      - '**.csproj'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@main
      - name: 'Setup .NET'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: 'Restore dependencies'
        run: dotnet restore FL.LigaImmich.slnx
      - name: 'Build'
        run: dotnet build FL.LigaImmich.slnx --configuration Release --no-restore
      - name: 'Test'
        run: dotnet test FL.LigaImmich.slnx --configuration Release --no-build --verbosity normal
